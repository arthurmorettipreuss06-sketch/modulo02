<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Estudos DOM</h1>
    <p>Aprendendo a usar o DOM em js</p>
    <p>Aqui que vai mudar</p>
    <p class= 'msg'id="msg">vamos usar outro <strong>seletor</strong></p>

    <label for="nome">Digite seu nome:</label>
    <input type="text" id="nome" name="nome">
    <button onclick="monstrarnome()">Monstrar</button>
    <p id="resultado"></p>
    <p id="texto">Vamos usar querySelector</p>

    <script>
    //     window.document.write(`Testando o DOM`)
    let paragrafo = document.getElementsByTagName('p')[1]
    paragrafo.innerText = `Texto alterado pelo JS`
    paragrafo.style.color = '#1E90FF'
    document.getElementsByTagName('p')[0].innerText ='Mudou direto'
    //let p2 = document.getElementById("msg")
    //p2.innerHTML = "Usamos o seletor ID para mudar o texto"
    let p2 =document.getElementsByClassName('msg')[0]
    p2.innerHTML = `mudamos pelo seletor de <strong>CLASSE</strong>`

        function monstrarnome(){
            let nome = document.getElementsByName("nome")[0].value
            document.getElementById("resultado").innerText = `Olá, ${nome}`
        }


        let texto = document.querySelector('#texto')
        texto.innerText = 'Usamos o querySelector pelo #(ID)'
</script>
</body>
</html>
